# QuantumFence — Nginx Reverse Proxy Configuration

upstream backend {
    server backend:8000;
    keepalive 32;
}

# HTTP → HTTPS redirect (when SSL is configured)
# server {
#     listen 80;
#     server_name _;
#     return 301 https://$host$request_uri;
# }

server {
    listen 80;
    listen [::]:80;
    server_name _;

    # Security headers
    add_header X-Frame-Options          "SAMEORIGIN"          always;
    add_header X-Content-Type-Options   "nosniff"             always;
    add_header X-XSS-Protection         "1; mode=block"       always;
    add_header Referrer-Policy          "strict-origin"       always;
    add_header Permissions-Policy       "camera=(), microphone=()" always;
    add_header Content-Security-Policy  "default-src 'self'; script-src 'self' 'unsafe-inline' https://unpkg.com https://cdnjs.cloudflare.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://unpkg.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https://*.tile.openstreetmap.org https://*.cartocdn.com https://maps.googleapis.com; connect-src 'self' ws: wss:;" always;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;
    gzip_comp_level 5;

    # Health check endpoint
    location /health {
        access_log off;
        return 200 '{"status":"ok","service":"quantumfence-nginx"}';
        add_header Content-Type application/json;
    }

    # ── API Proxy ─────────────────────────────────────────────────────────────
    location /api/ {
        proxy_pass         http://backend/api/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
        client_max_body_size 50M;

        # CORS for API
        add_header Access-Control-Allow-Origin  "$http_origin" always;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Authorization, Content-Type" always;
        if ($request_method = OPTIONS) { return 204; }
    }

    # ── WebSocket Proxy ───────────────────────────────────────────────────────
    location /ws/ {
        proxy_pass         http://backend/ws/;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host       $host;
        proxy_read_timeout 86400s;  # Long-lived WebSocket connections
        proxy_send_timeout 86400s;
    }

    # ── Static Snapshots ──────────────────────────────────────────────────────
    location /snapshots/ {
        proxy_pass http://backend/snapshots/;
        expires    1h;
        add_header Cache-Control "public, immutable";
    }

    # ── Frontend SPA ──────────────────────────────────────────────────────────
    location / {
        root  /usr/share/nginx/html;
        index index.html;

        # Cache static assets aggressively
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires    30d;
            add_header Cache-Control "public, immutable";
            access_log off;
        }

        # React SPA fallback
        try_files $uri $uri/ /index.html;
    }

    # Block common attack patterns
    location ~* (\.php|\.asp|\.aspx|\.jsp|\.cgi|\.env|\.git|wp-admin) {
        return 404;
    }
}
