[pytest]
testpaths = code/tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts =
    -v
    --tb=short
    --strict-markers
    --color=yes
    -p no:warnings
    --cov=code/backend
    --cov=code/ai_models
    --cov=code/integrations
    --cov-report=term-missing:skip-covered
    --cov-report=html:coverage_html
    --cov-fail-under=80

markers =
    unit:        Pure unit tests — no I/O or DB
    integration: Tests that use a real SQLite DB
    api:         Tests that exercise FastAPI routes via TestClient
    slow:        Tests that take > 1 second
