# QuantumFence — Prometheus Monitoring Configuration
global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    system: "quantumfence"

rule_files:
  - "alert_rules.yml"

alerting:
  alertmanagers:
    - static_configs:
        - targets: []

scrape_configs:
  # ── QuantumFence Backend ─────────────────────────────────────────────────────
  - job_name: "quantumfence-backend"
    static_configs:
      - targets: ["backend:8000"]
    metrics_path: "/metrics"
    scrape_interval: 10s

  # ── Postgres Exporter ────────────────────────────────────────────────────────
  - job_name: "postgres"
    static_configs:
      - targets: ["db:5432"]

  # ── Redis Exporter ───────────────────────────────────────────────────────────
  - job_name: "redis"
    static_configs:
      - targets: ["redis:6379"]

  # ── Node Exporter (system metrics) ───────────────────────────────────────────
  - job_name: "node"
    static_configs:
      - targets: ["localhost:9100"]
